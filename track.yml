title: Coder Agents & AI Governance - v2
teaser: Drive a self-hosted coding agent from chat and from CI, prove the workspace
  holds no keys or agent binary, then audit every prompt, tool call, and token through
  the AI Gateway and Grafana.
description: |
  <b style="color:#7511E2;">Open by design. Secure by default.</b>

  Coder Agents runs the entire agent loop in the control plane — not the developer's workspace. No LLM credentials, no agent binary, no AI awareness inside the workspace. The AI Governance Add-On then sits in front of every model call, centralizing provider credentials and recording who ran which prompt, against which model, with which tool calls, at what cost.

  The sandbox stands up three self-hosted deployments for you: a Coder control plane, a Gitea git server, and a Grafana dashboard. You sign in to Coder with your own identity using Gitea authentication (OIDC), then ask an agent to scan a repository and list its issues without ever provisioning a workspace, hand it a real issue, and watch it implement, verify, commit, and open a pull request. Trigger the same agent from CI, open the workspace yourself to confirm there are no AI credentials inside, and read the complete audit trail — attributed to you — in both the Coder UI and the Grafana dashboard.

  Models are served directly from Amazon Bedrock, and the whole sandbox is ephemeral — spun up for you and destroyed when you finish. By the end you will be able to explain, from first principles, where the AI actually lives and exactly what it can touch.
