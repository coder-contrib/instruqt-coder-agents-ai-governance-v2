version: "3"
virtualmachines:
- name: workshop
  image: coder/coder-ai-governance-ubuntu-2404-50
  shell: /bin/bash
  memory: 16384
  cpus: 4
  allow_external_ingress:
  - http
  - https
  - high-ports
  provision_ssl_certificate: true
aws_accounts:
- name: coder-agents-bedrock
  services:
  - bedrock
  regions:
  - us-east-1
  - us-west-2
  iam_policy: |-
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Sid": "BedrockInvoke",
          "Effect": "Allow",
          "Action": [
            "bedrock:InvokeModel",
            "bedrock:InvokeModelWithResponseStream",
            "bedrock:CallWithBearerToken",
            "bedrock:ListFoundationModels",
            "bedrock:GetFoundationModel",
            "bedrock:ListInferenceProfiles",
            "bedrock:GetInferenceProfile"
          ],
          "Resource": "*"
        },
        {
          "Sid": "BedrockMarketplaceModelAccess",
          "Effect": "Allow",
          "Action": [
            "aws-marketplace:ViewSubscriptions",
            "aws-marketplace:Subscribe",
            "aws-marketplace:Unsubscribe"
          ],
          "Resource": "*"
        }
      ]
    }
  admin_iam_policy: |-
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Sid": "BedrockAdmin",
          "Effect": "Allow",
          "Action": [
            "bedrock:*",
            "aws-marketplace:ViewSubscriptions",
            "aws-marketplace:Subscribe",
            "aws-marketplace:Unsubscribe"
          ],
          "Resource": "*"
        }
      ]
    }
